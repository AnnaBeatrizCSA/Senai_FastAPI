name: Python application

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

env:
  IMAGE_NAME: annabeatrizabc/senai_api_ta
  CONTAINER_NAME: senai_api_container

jobs:

  build:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Testando o Codigo
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Executar o pytest no projeto
        run: |
          PYTHONPATH=. pytest tests/ -v --tb=short


  Imagem:
    name: Construindo Imagem para o Docker
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PWD }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}


  Deploy_Homologacao:
    name: Deploy em Homologacao
    runs-on: ubuntu-latest
    needs: Imagem

    if: github.ref == 'refs/heads/develop'

    environment:
      name: homologacao

    steps:
      - name: Deploy na EC2 HML
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_HML }}
          username: ${{ secrets.EC2_USERNAME_HML }}
          key: ${{ secrets.EC2_SSH_KEY_HML }}

          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8080:8080 \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}


  Deploy_Producao:
    name: Deploy em Producao
    runs-on: ubuntu-latest
    needs: Imagem

    if: github.ref == 'refs/heads/main'

    environment:
      name: producao

    steps:
      - name: Deploy na EC2 PRD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p 8080:8080 \
              ${{ env.IMAGE_NAME }}:${{ github.sha }}
